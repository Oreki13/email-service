<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                50: "#1e293b",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
              },
              dark: {
                50: "#f8fafc",
                100: "#f1f5f9",
                200: "#e2e8f0",
                300: "#cbd5e1",
                400: "#94a3b8",
                500: "#64748b",
                600: "#475569",
                700: "#334155",
                800: "#1e293b",
                900: "#0f172a",
              },
            },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body
    class="bg-dark-900 min-h-screen flex items-center justify-center"
    style="
      background-image: radial-gradient(
          circle at 25% 25%,
          rgba(59, 130, 246, 0.1) 0%,
          transparent 50%
        ),
        radial-gradient(
          circle at 75% 75%,
          rgba(168, 85, 247, 0.1) 0%,
          transparent 50%
        );
    "
  >
    <div class="max-w-md w-full space-y-8">
      <div
        class="bg-dark-800 shadow-2xl rounded-2xl overflow-hidden border border-dark-700"
      >
        <div class="bg-primary-500 px-8 py-6 text-center">
          <h2 class="text-white text-2xl font-bold">
            <i class="fas fa-envelope mr-3"></i>Email Service
          </h2>
          <p class="text-primary-100 mt-1">Template Management</p>
        </div>

        <div class="p-8">
          {{if .Error}}
          <div
            class="mb-6 bg-red-500/10 border border-red-500/20 text-red-400 rounded-lg p-4"
          >
            <div class="flex items-center">
              <i class="fas fa-exclamation-triangle text-red-400 mr-3"></i>
              <span>{{.Error}}</span>
            </div>
          </div>
          {{end}}

          <form method="POST" action="/login" class="space-y-6">
            <div>
              <label
                for="username"
                class="block text-sm font-medium text-gray-300 mb-2"
              >
                <i class="fas fa-user mr-2 text-gray-400"></i>Username
              </label>
              <input
                type="text"
                id="username"
                name="username"
                required
                class="w-full px-4 py-3 bg-dark-700 border border-dark-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-white placeholder-gray-400 transition duration-200"
                placeholder="Enter your username"
              />
            </div>

            <div>
              <label
                for="password"
                class="block text-sm font-medium text-gray-300 mb-2"
              >
                <i class="fas fa-lock mr-2 text-gray-400"></i>Password
              </label>
              <input
                type="password"
                id="password"
                name="password"
                required
                class="w-full px-4 py-3 bg-dark-700 border border-dark-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-white placeholder-gray-400 transition duration-200"
                placeholder="Enter your password"
              />
            </div>

            <button
              type="submit"
              class="w-full bg-primary-500 hover:bg-primary-600 active:bg-primary-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-dark-800"
            >
              <i class="fas fa-sign-in-alt mr-2"></i>Login
            </button>
          </form>
        </div>

        <div class="bg-dark-700 px-8 py-4 text-center border-t border-dark-600">
          <small class="text-gray-400"
            >&copy; 2025 Email Service Management</small
          >
        </div>
      </div>
    </div>
  </body>
</html>
