apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  labels:
    app: email-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: email-service
    spec:
      containers:
        - name: email-service
          image: ${DOCKER_REGISTRY}/email-service:${APP_VERSION}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_HTTP_PORT
              value: "8080"
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: db-host
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: db-port
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: db-username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: db-password
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: db-name
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: redis-port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: redis-password
            - name: RABBITMQ_HOST
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: rabbitmq-host
            - name: RABBITMQ_PORT
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: rabbitmq-port
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: rabbitmq-username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: rabbitmq-password
            - name: AUTH_ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: admin-api-token
            - name: APP_ENVIRONMENT
              value: ${ENVIRONMENT}
            - name: APP_LOG_LEVEL
              value: "info"
            - name: APP_SERVICE_NAME
              value: "email-service"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: email-storage
              mountPath: /app/storage
      volumes:
        - name: email-storage
          persistentVolumeClaim:
            claimName: email-storage-claim
